{% extends "layout.html" %}
{% block title %} Create Movie OR Series {% endblock %}
{% block head %}
<script>
  function previewPoster(input) {
    const preview = input.closest('form').querySelector('.poster-preview');
    const file = input.files[0];
    if (file) {
      preview.src = URL.createObjectURL(file);
      preview.classList.remove('hidden');
    }
  }

  function switchTab(tab) {
    const movieTab = document.getElementById('tab-movie');
    const seriesTab = document.getElementById('tab-series');
    const movieForm = document.getElementById('form-movie');
    const seriesForm = document.getElementById('form-series');

    if (tab === 'movie') {
      movieTab.classList.add('text-indigo-600', 'border-indigo-600', 'font-medium');
      movieTab.classList.remove('text-gray-400', 'border-transparent');
      seriesTab.classList.remove('text-indigo-600', 'border-indigo-600', 'font-medium');
      seriesTab.classList.add('text-gray-400', 'border-transparent');
      movieForm.classList.remove('hidden');
      seriesForm.classList.add('hidden');
    } else {
      seriesTab.classList.add('text-indigo-600', 'border-indigo-600', 'font-medium');
      seriesTab.classList.remove('text-gray-400', 'border-transparent');
      movieTab.classList.remove('text-indigo-600', 'border-indigo-600', 'font-medium');
      movieTab.classList.add('text-gray-400', 'border-transparent');
      seriesForm.classList.remove('hidden');
      movieForm.classList.add('hidden');
    }
  }

  function toggleEpisodes() {
    const section = document.getElementById('episodes-section');
    const btn = document.getElementById('toggle-episodes-btn');
    const isHidden = section.classList.toggle('hidden');
    btn.textContent = isHidden ? '📝 Add Episodes' : '📝 Hide Episodes';
  }

  function addEpisode() {
    const container = document.getElementById('episodes-container');
    const idx = container.children.length;

    const html = `
      <div class="episode-entry rounded-lg border border-gray-200 bg-gray-50 p-4">
        <div class="mb-3 flex items-center justify-between">
          <span class="text-sm font-semibold text-gray-700">Episode #${idx + 1}</span>
          <button type="button" onclick="removeEpisode(this)" class="text-sm font-medium text-red-500 hover:text-red-700">Remove</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-gray-600">Season #</label>
            <input type="number" name="episodes[${idx}][season_number]" min="1" value="1" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-gray-600">Episode #</label>
            <input type="number" name="episodes[${idx}][episode_number]" min="1" value="${idx + 1}" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
          </div>
        </div>
        <div class="mt-3">
          <label class="mb-1 block text-xs font-medium text-gray-600">Title</label>
          <input type="text" name="episodes[${idx}][title]" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" required />
        </div>
        <div class="mt-3">
          <label class="mb-1 block text-xs font-medium text-gray-600">Description</label>
          <textarea name="episodes[${idx}][description]" rows="2" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
        </div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <div>
            <label class="mb-1 block text-xs font-medium text-gray-600">Rating</label>
            <input type="number" step="0.1" name="episodes[${idx}][rating]" min="0" max="10" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="mb-1 block text-xs font-medium text-gray-600">Release Year</label>
            <input type="number" name="episodes[${idx}][release_year]" min="1900" max="2100" class="w-full rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>
      </div>
    `;

    container.insertAdjacentHTML('beforeend', html);
  }

  function removeEpisode(btn) {
    const entry = btn.closest('.episode-entry');
    const container = document.getElementById('episodes-container');
    entry.remove();
    // Re-number remaining episodes so indices stay sequential
    container.querySelectorAll('.episode-entry').forEach((el, i) => {
      el.querySelector('span').textContent = `Episode #${i + 1}`;
      el.querySelectorAll('[name]').forEach(input => {
        input.setAttribute('name', input.getAttribute('name').replace(/\[\d+\]/, `[${i}]`));
      });
    });
  }
</script>
{% endblock %}
{% block content %}
<main class="flex min-h-screen items-center justify-center p-6">
  <div class="mx-auto w-full max-w-4xl rounded-xl p-8 shadow-lg">
    <!-- Toggle Tabs -->
    <div class="flex w-full items-center justify-center space-x-8 border-b border-slate-300 pb-2">
      <button
        id="tab-movie"
        type="button"
        onclick="switchTab('movie')"
        class="border-b-2 border-indigo-600 pb-2 text-indigo-600 font-medium transition"
      >
        <span class="text-lg">🎬 Movie</span>
      </button>
      <button
        id="tab-series"
        type="button"
        onclick="switchTab('series')"
        class="border-b-2 border-transparent pb-2 text-gray-400 transition hover:text-gray-600"
      >
        <span class="text-lg">📺 Series</span>
      </button>
    </div>

    <div class="pt-6">
      <!-- ============ MOVIE FORM ============ -->
      <form id="form-movie" action="/movie/create" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="grid grid-cols-1 gap-8 md:grid-cols-2">
          <!-- Left: Poster Upload -->
          <div class="flex flex-col items-center">
            <img class="poster-preview hidden h-auto w-full rounded-lg shadow" alt="Poster Preview" />
            <label class="mt-4 w-full">
              <span class="mb-2 block text-sm font-medium text-gray-700">Upload Poster</span>
              <input
                type="file"
                name="poster"
                accept="image/*"
                onchange="previewPoster(this)"
                class="block w-full text-sm text-gray-500 file:mr-4 file:rounded file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-indigo-700 hover:file:bg-indigo-100"
                required
              />
            </label>
          </div>

          <!-- Right: Movie Fields -->
          <div class="space-y-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Title</label>
              <input
                type="text"
                name="title"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Release Year</label>
              <input
                type="number"
                name="release_year"
                min="1900"
                max="2100"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Rating</label>
              <input
                type="number"
                step="0.1"
                name="rating"
                min="0"
                max="10"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Genre</label>
              <input
                type="text"
                name="genre"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Description</label>
              <textarea
                name="description"
                rows="3"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              ></textarea>
            </div>
            <div class="flex items-center space-x-2">
              <input
                type="checkbox"
                name="is_private"
                id="is_private_movie"
                class="h-4 w-4 rounded border-gray-300 text-indigo-600"
              />
              <label for="is_private_movie" class="text-sm text-gray-700">Make this movie private</label>
            </div>
            <div>
              <button
                type="submit"
                class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-white shadow transition hover:bg-indigo-700"
              >
                🎥 Create Movie
              </button>
            </div>
          </div>
        </div>
      </form>

      <!-- ============ SERIES FORM ============ -->
      <form id="form-series" action="/series/create" method="POST" enctype="multipart/form-data" class="hidden">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="grid grid-cols-1 gap-8 md:grid-cols-2">
          <!-- Left: Poster Upload -->
          <div class="flex flex-col items-center">
            <img class="poster-preview hidden h-auto w-full rounded-lg shadow" alt="Poster Preview" />
            <label class="mt-4 w-full">
              <span class="mb-2 block text-sm font-medium text-gray-700">Upload Poster</span>
              <input
                type="file"
                name="poster"
                accept="image/*"
                onchange="previewPoster(this)"
                class="block w-full text-sm text-gray-500 file:mr-4 file:rounded file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-indigo-700 hover:file:bg-indigo-100"
                required
              />
            </label>
          </div>

          <!-- Right: Series Fields -->
          <div class="space-y-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Title</label>
              <input
                type="text"
                name="title"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Release Year</label>
              <input
                type="number"
                name="release_year"
                min="1900"
                max="2100"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Genre</label>
              <input
                type="text"
                name="genre"
                placeholder="e.g. Action, Drama, Sci-Fi"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-gray-700">Description</label>
              <textarea
                name="description"
                rows="3"
                class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
              ></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Number of Seasons</label>
                <input
                  type="number"
                  name="number_of_seasons"
                  min="1"
                  class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  required
                />
              </div>
              <div>
                <label class="mb-1 block text-sm font-medium text-gray-700">Number of Episodes</label>
                <input
                  type="number"
                  name="number_of_episodes"
                  min="1"
                  class="w-full rounded-lg border px-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                  required
                />
              </div>
            </div>
            <div class="flex items-center space-x-2">
              <input
                type="checkbox"
                name="is_private"
                id="is_private_series"
                class="h-4 w-4 rounded border-gray-300 text-indigo-600"
              />
              <label for="is_private_series" class="text-sm text-gray-700">Make this series private</label>
            </div>
          </div>
        </div>

        <!-- ===== Episodes Section ===== -->
        <div class="mt-8 border-t border-gray-200 pt-6">
          <button
            id="toggle-episodes-btn"
            type="button"
            onclick="toggleEpisodes()"
            class="flex items-center gap-2 text-indigo-600 font-medium hover:text-indigo-800 transition"
          >
            📝 Add Episodes
          </button>

          <div id="episodes-section" class="hidden mt-4 space-y-4">
            <p class="text-sm text-gray-500">Add individual episodes with details. Episode indices re-number automatically when you remove one.</p>
            <div id="episodes-container"></div>
            <button
              type="button"
              onclick="addEpisode()"
              class="rounded-lg border border-indigo-300 px-4 py-2 text-sm text-indigo-600 hover:bg-indigo-50 transition"
            >
              + Add Episode
            </button>
          </div>
        </div>

        <!-- Submit -->
        <div class="mt-6">
          <button
            type="submit"
            class="w-full rounded-lg bg-indigo-600 px-4 py-2 text-white shadow transition hover:bg-indigo-700"
          >
            📺 Create Series
          </button>
        </div>
      </form>
    </div>
  </div>
</main>
{% endblock %}
